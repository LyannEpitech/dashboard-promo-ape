name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  COVERAGE_THRESHOLD: 55

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint || echo "No lint script"
      
      - name: Run tests with coverage
        run: npm test -- --coverage
        env:
          NODE_OPTIONS: '--experimental-vm-modules'
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: ./backend/coverage/
          retention-days: 30
      
      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct // 0')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Backend coverage: $COVERAGE%"

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests with coverage
        run: npm test -- --run --coverage
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: ./frontend/coverage/
          retention-days: 30
      
      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct // 0')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Frontend coverage: $COVERAGE%"

  coverage-compare:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download PR coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-report
          path: ./pr-coverage/backend
      
      - name: Download PR frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-report
          path: ./pr-coverage/frontend
      
      - name: Checkout main branch coverage
        run: |
          git fetch origin main:main
          git checkout main -- coverage-summary.json || echo "No coverage file on main"
        continue-on-error: true
      
      - name: Compare coverage with main
        id: compare
        run: |
          echo "## 📊 Coverage Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get PR coverage
          PR_BACKEND_COV=$(cat ./pr-coverage/backend/coverage-summary.json | jq '.total.lines.pct // 0')
          PR_FRONTEND_COV=$(cat ./pr-coverage/frontend/coverage-summary.json | jq '.total.lines.pct // 0')
          
          echo "### PR Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${PR_BACKEND_COV}%" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${PR_FRONTEND_COV}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Try to get main coverage (from cache or file)
          MAIN_BACKEND_COV=""
          MAIN_FRONTEND_COV=""
          
          if [ -f coverage-summary.json ]; then
            MAIN_BACKEND_COV=$(cat coverage-summary.json | jq '.backend.lines // 0')
            MAIN_FRONTEND_COV=$(cat coverage-summary.json | jq '.frontend.lines // 0')
          fi
          
          # Check threshold
          FAILED=0
          
          if (( $(echo "$PR_BACKEND_COV < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "❌ Backend coverage ($PR_BACKEND_COV%) below threshold ($COVERAGE_THRESHOLD%)" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          else
            echo "✅ Backend coverage ($PR_BACKEND_COV%) meets threshold" >> $GITHUB_STEP_SUMMARY
          fi
          
          if (( $(echo "$PR_FRONTEND_COV < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "❌ Frontend coverage ($PR_FRONTEND_COV%) below threshold ($COVERAGE_THRESHOLD%)" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          else
            echo "✅ Frontend coverage ($PR_FRONTEND_COV%) meets threshold" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Compare with main if available
          if [ -n "$MAIN_BACKEND_COV" ] && [ "$MAIN_BACKEND_COV" != "0" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Comparison with main" >> $GITHUB_STEP_SUMMARY
            
            BACKEND_DIFF=$(echo "$PR_BACKEND_COV - $MAIN_BACKEND_COV" | bc)
            FRONTEND_DIFF=$(echo "$PR_FRONTEND_COV - $MAIN_FRONTEND_COV" | bc)
            
            echo "- Backend: ${BACKEND_DIFF}% ($MAIN_BACKEND_COV% → $PR_BACKEND_COV%)" >> $GITHUB_STEP_SUMMARY
            echo "- Frontend: ${FRONTEND_DIFF}% ($MAIN_FRONTEND_COV% → $PR_FRONTEND_COV%)" >> $GITHUB_STEP_SUMMARY
            
            # Fail if coverage decreased
            if (( $(echo "$BACKEND_DIFF < 0" | bc -l) )); then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "⚠️ **WARNING: Backend coverage decreased by ${BACKEND_DIFF#-}%**" >> $GITHUB_STEP_SUMMARY
              # Uncomment to make this a hard failure:
              # FAILED=1
            fi
            
            if (( $(echo "$FRONTEND_DIFF < 0" | bc -l) )); then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "⚠️ **WARNING: Frontend coverage decreased by ${FRONTEND_DIFF#-}%**" >> $GITHUB_STEP_SUMMARY
              # Uncomment to make this a hard failure:
              # FAILED=1
            fi
          fi
          
          if [ $FAILED -eq 1 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Coverage check FAILED**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Coverage check PASSED**" >> $GITHUB_STEP_SUMMARY
      
      - name: Calculate coverage differences
        id: diff
        run: |
          # Get PR coverage
          PR_BACKEND_COV=$(cat ./pr-coverage/backend/coverage-summary.json | jq '.total.lines.pct // 0')
          PR_FRONTEND_COV=$(cat ./pr-coverage/frontend/coverage-summary.json | jq '.total.lines.pct // 0')
          
          # Get main coverage
          MAIN_BACKEND_COV=55.72
          MAIN_FRONTEND_COV=71.31
          
          if [ -f coverage-summary.json ]; then
            MAIN_BACKEND_COV=$(cat coverage-summary.json | jq '.backend.lines // 55.72')
            MAIN_FRONTEND_COV=$(cat coverage-summary.json | jq '.frontend.lines // 71.31')
          fi
          
          # Calculate differences
          BACKEND_DIFF=$(echo "$PR_BACKEND_COV - $MAIN_BACKEND_COV" | bc)
          FRONTEND_DIFF=$(echo "$PR_FRONTEND_COV - $MAIN_FRONTEND_COV" | bc)
          
          # Format with + or - sign and emoji
          if (( $(echo "$BACKEND_DIFF >= 0" | bc -l) )); then
            BACKEND_DIFF_FMT="+$BACKEND_DIFF% 🟢"
          else
            BACKEND_DIFF_FMT="$BACKEND_DIFF% 🔴"
          fi
          
          if (( $(echo "$FRONTEND_DIFF >= 0" | bc -l) )); then
            FRONTEND_DIFF_FMT="+$FRONTEND_DIFF% 🟢"
          else
            FRONTEND_DIFF_FMT="$FRONTEND_DIFF% 🔴"
          fi
          
          echo "backend_diff=$BACKEND_DIFF_FMT" >> $GITHUB_OUTPUT
          echo "frontend_diff=$FRONTEND_DIFF_FMT" >> $GITHUB_OUTPUT
          echo "pr_backend=$PR_BACKEND_COV" >> $GITHUB_OUTPUT
          echo "pr_frontend=$PR_FRONTEND_COV" >> $GITHUB_OUTPUT
          echo "main_backend=$MAIN_BACKEND_COV" >> $GITHUB_OUTPUT
          echo "main_frontend=$MAIN_FRONTEND_COV" >> $GITHUB_OUTPUT
      
      - name: Comment PR with coverage comparison
        uses: actions/github-script@v7
        with:
          script: |
            const backendDiff = '${{ steps.diff.outputs.backend_diff }}';
            const frontendDiff = '${{ steps.diff.outputs.frontend_diff }}';
            const prBackend = parseFloat('${{ steps.diff.outputs.pr_backend }}');
            const prFrontend = parseFloat('${{ steps.diff.outputs.pr_frontend }}');
            const mainBackend = parseFloat('${{ steps.diff.outputs.main_backend }}');
            const mainFrontend = parseFloat('${{ steps.diff.outputs.main_frontend }}');
            
            const body = `## 📊 Coverage Report
            
            | Project | PR Coverage | Main Coverage | Diff | Threshold | Status |
            |---------|-------------|---------------|------|-----------|--------|
            | Backend | ${prBackend}% | ${mainBackend}% | **${backendDiff}** | 55% | ${prBackend >= 55 ? '✅' : '❌'} |
            | Frontend | ${prFrontend}% | ${mainFrontend}% | **${frontendDiff}** | 55% | ${prFrontend >= 55 ? '✅' : '❌'} |
            
            ${prBackend < 55 || prFrontend < 55 ? '❌ **Coverage check FAILED**' : '✅ **Coverage check PASSED**'}
            
            ${backendDiff.includes('🔴') || frontendDiff.includes('🔴') ? '⚠️ **Warning: Coverage decreased compared to main**' : '🎉 **Coverage improved or maintained**'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  coverage-store:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-report
          path: ./coverage/backend
      
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-report
          path: ./coverage/frontend
      
      - name: Store coverage for main branch
        run: |
          # Create coverage summary for main
          BACKEND_COV=$(cat ./coverage/backend/coverage-summary.json | jq '.total.lines.pct // 0')
          FRONTEND_COV=$(cat ./coverage/frontend/coverage-summary.json | jq '.total.lines.pct // 0')
          
          echo "{" > coverage-summary.json
          echo "  \"backend\": {" >> coverage-summary.json
          echo "    \"lines\": $BACKEND_COV" >> coverage-summary.json
          echo "  }," >> coverage-summary.json
          echo "  \"frontend\": {" >> coverage-summary.json
          echo "    \"lines\": $FRONTEND_COV" >> coverage-summary.json
          echo "  }" >> coverage-summary.json
          echo "}" >> coverage-summary.json
          
          cat coverage-summary.json
          
          # Commit coverage file (optional - could also use artifacts or external storage)
          # git add coverage-summary.json
          # git commit -m "chore: Update coverage summary [skip ci]"
          # git push

  integration-check:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Final check
        run: |
          echo "## ✅ CI Passed!" >> $GITHUB_STEP_SUMMARY
          echo "- Backend tests: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend tests: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Ready to merge!" >> $GITHUB_STEP_SUMMARY