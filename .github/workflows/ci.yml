name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  COVERAGE_THRESHOLD: 40

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint || echo "No lint script"
      
      - name: Run tests with coverage
        run: npm test -- --coverage
        env:
          NODE_OPTIONS: '--experimental-vm-modules'
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: ./backend/coverage/
          retention-days: 30
      
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coveragePath = './backend/coverage/coverage-summary.json';
            if (fs.existsSync(coveragePath)) {
              const coverage = JSON.parse(fs.readFileSync(coveragePath, 'utf8'));
              const lines = coverage.total.lines.pct;
              const statements = coverage.total.statements.pct;
              const functions = coverage.total.functions.pct;
              const branches = coverage.total.branches.pct;
              
              const body = `## 📊 Backend Coverage Report
              | Metric | Coverage |
              |--------|----------|
              | Lines | ${lines}% |
              | Statements | ${statements}% |
              | Functions | ${functions}% |
              | Branches | ${branches}% |
              
              ${lines < 40 ? '⚠️ Coverage below threshold (40%)' : '✅ Coverage meets threshold'}`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests with coverage
        run: npm test -- --run --coverage
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: ./frontend/coverage/
          retention-days: 30
      
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coveragePath = './frontend/coverage/coverage-summary.json';
            if (fs.existsSync(coveragePath)) {
              const coverage = JSON.parse(fs.readFileSync(coveragePath, 'utf8'));
              const lines = coverage.total.lines.pct;
              const statements = coverage.total.statements.pct;
              const functions = coverage.total.functions.pct;
              const branches = coverage.total.branches.pct;
              
              const body = `## 📊 Frontend Coverage Report
              | Metric | Coverage |
              |--------|----------|
              | Lines | ${lines}% |
              | Statements | ${statements}% |
              | Functions | ${functions}% |
              | Branches | ${branches}% |
              
              ${lines < 40 ? '⚠️ Coverage below threshold (40%)' : '✅ Coverage meets threshold'}`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
      
      - name: Build
        run: npm run build

  coverage-check:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-report
          path: ./backend-coverage
      
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-report
          path: ./frontend-coverage
      
      - name: Check coverage didn't decrease
        run: |
          echo "## Coverage Check" >> $GITHUB_STEP_SUMMARY
          
          # Get main branch coverage (would need to be stored somewhere)
          # For now, just check against threshold
          echo "Checking coverage against threshold ($COVERAGE_THRESHOLD%)..." >> $GITHUB_STEP_SUMMARY
          
          if [ -f ./backend-coverage/coverage-summary.json ]; then
            BACKEND_COV=$(cat ./backend-coverage/coverage-summary.json | jq '.total.lines.pct // 0')
            echo "Backend: ${BACKEND_COV}%" >> $GITHUB_STEP_SUMMARY
            if (( $(echo "$BACKEND_COV < $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "❌ Backend coverage below threshold" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          fi
          
          if [ -f ./frontend-coverage/coverage-summary.json ]; then
            FRONTEND_COV=$(cat ./frontend-coverage/coverage-summary.json | jq '.total.lines.pct // 0')
            echo "Frontend: ${FRONTEND_COV}%" >> $GITHUB_STEP_SUMMARY
            if (( $(echo "$FRONTEND_COV < $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "❌ Frontend coverage below threshold" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          fi
          
          echo "✅ All coverage checks passed!" >> $GITHUB_STEP_SUMMARY

  integration-check:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Final check
        run: |
          echo "## ✅ CI Passed!" >> $GITHUB_STEP_SUMMARY
          echo "- Backend tests: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend tests: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Ready to merge!" >> $GITHUB_STEP_SUMMARY